<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LYRIC WORKSPACE</title>
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com;
               font-src https://fonts.gstatic.com;
               img-src 'self' data: blob: https://*.googleusercontent.com;
               media-src 'self' data: blob:;
               connect-src 'self' https://*.supabase.co wss://*.supabase.co https://accounts.google.com;
               frame-src https://accounts.google.com;" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      if (window.location.protocol === 'file:') {
        window.location.replace('https://lyric-workspace.vercel.app/' + (window.location.hash || '#pc'));
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: thin; scrollbar-color: #404040 transparent; }
      *::-webkit-scrollbar { width: 5px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb { background: #404040; border-radius: 999px; }
      textarea::selection { background: rgba(74,240,160,0.28); color: #c8ccd8; }
      body { background: #0a0a0a; overflow: hidden; }
      @keyframes ctxFade { from { opacity: 0; transform: scale(.96) translateY(-3px); } to { opacity: 1; transform: scale(1) translateY(0); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
          navigator.serviceWorker.register('/sw.js?v=20260519-ui2').then((registration) => {
            registration.update().catch(() => {});
            if (registration.waiting) registration.waiting.postMessage({ type: 'SKIP_WAITING' });
            registration.addEventListener('updatefound', () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
